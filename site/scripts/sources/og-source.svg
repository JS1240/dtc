<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f5f0e6"/>

  <!-- decorative paper-line texture (subtle) -->
  <g opacity="0.06">
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#1a1614" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#1a1614" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#1a1614" stroke-width="1"/>
  </g>

  <!-- accent stripe top-right -->
  <rect x="900" y="0" width="300" height="80" fill="#ff5b2e"/>

  <!-- logo block top-left -->
  <circle cx="92" cy="92" r="22" fill="#ff5b2e"/>
  <text x="128" y="106" font-family="Archivo, system-ui, sans-serif" font-weight="900" font-size="44" letter-spacing="-2" fill="#1a1614">dtc.</text>

  <!-- headline -->
  <text x="80" y="320" font-family="Archivo, system-ui, sans-serif" font-weight="800" font-size="100" letter-spacing="-4" fill="#1a1614">Gradimo vašu</text>
  <text x="80" y="430" font-family="Archivo, system-ui, sans-serif" font-weight="700" font-style="italic" font-size="100" letter-spacing="-4" fill="#1a1614">digitalnu budućnost.</text>

  <!-- accent underline under "digitalnu" -->
  <path d="M82 448 Q 220 436, 360 444 T 660 440" stroke="#ff5b2e" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- subtitle -->
  <text x="80" y="540" font-family="Archivo, system-ui, sans-serif" font-weight="500" font-size="32" fill="#3a3530">Web · AI agenti · automatizacije · custom software</text>

  <!-- bottom-right tag -->
  <rect x="950" y="540" width="200" height="42" rx="21" fill="#1a1614"/>
  <text x="975" y="568" font-family="Archivo, system-ui, sans-serif" font-weight="700" font-size="18" fill="#fff">dtc.hr →</text>
</svg>
